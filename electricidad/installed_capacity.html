<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Installed Capacity — Ecuador</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;font-weight:300;background:#F5F6F8;color:#1A1A2E;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:14px;
    padding:14px;
    flex:1;
    min-height:0;
  }

  .card{
    background:#fff;border:1px solid #E5E5E5;border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    display:flex;flex-direction:column;
    overflow:hidden;min-height:0;
  }
  .card-header{
    padding:10px 16px 8px;border-bottom:1px solid #F0F0F0;flex-shrink:0;
    display:flex;align-items:baseline;gap:10px;
  }
  .card-title{font-size:12px;font-weight:500;color:#1A1A2E}
  .card-sub{font-size:10.5px;font-weight:300;color:#999}
  .card-body{flex:1;min-height:0;position:relative;padding:10px 14px 8px}

  .placeholder{
    display:flex;align-items:center;justify-content:center;
    height:100%;color:#CCC;font-size:12px;font-weight:300;letter-spacing:.3px;
  }
</style>
</head>
<body>

<div class="grid">

  <!-- Q1: Annual delta -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Annual Change in Installed Capacity</span>
      <span class="card-sub">MW added / removed by fuel type · 2017–2026</span>
    </div>
    <div class="card-body">
      <canvas id="deltaChart"></canvas>
    </div>
  </div>

  <!-- Q2: Monthly consumption -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Monthly Electricity Consumption</span>
      <span class="card-sub">GWh · Jan 2018 – Mar 2026</span>
    </div>
    <div class="card-body">
      <canvas id="consumChart"></canvas>
      <div id="consumStats" style="position:absolute;top:10px;right:14px;display:flex;flex-direction:column;gap:4px;text-align:right;pointer-events:none"></div>
    </div>
  </div>

  <!-- Q3: Billing by sector -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Invoiced Energy by Consumer Sector</span>
      <span class="card-sub">GWh · Jan 2018 – Mar 2026 · regulated clients</span>
    </div>
    <div class="card-body">
      <canvas id="sectorChart"></canvas>
    </div>
  </div>

  <!-- Q4: placeholder -->
  <div class="card">
    <div class="card-header"><span class="card-title">Hydro vs. Thermal</span></div>
    <div class="card-body"><div class="placeholder">Coming soon</div></div>
  </div>

</div>

<script>
const YEARS = ['2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];

const SERIES = [
  { label:'Hydro',    color:'#1565C0', data:[68.2,550,10.2,17.5,8.1,79.1,1,218.9,-14.8,22.1] },
  { label:'Therm.',   color:'#B71C1C', data:[-307.7,-5.5,-13.8,1.5,-48.6,-1.4,0,107.1,228.5,204.4] },
  { label:'GEE',      color:'#1A1A2E', data:[0,0,0,0,0,0,0,359.6,47,-1.1] },
  { label:'Biomass',  color:'#2E7D32', data:[0,0,0,0,0,0,0,11.3,0,1.3] },
  { label:'Solar',    color:'#F9A825', data:[0,1.2,0,0,0,1,38.7,15.5,46.8,3.3] },
  { label:'Wind',     color:'#0288D1', data:[0,0,0,0,0,28.6,21.4,0,0,0] },
  { label:'Biogas',   color:'#6D4C41', data:[4.7,0,0,0,0.7,0,0,2.8,0,0] },
];

// --- Q2: Monthly consumption ---
const CONSUM_VALUES = [2158.8,1848.8,2078.4,2072.8,2090.8,1920.9,1935.5,1954.2,1936.6,1978.1,1962.9,2065.3,2214.6,2146.8,2357,2274.1,2330.3,2179.6,2160.9,2195.7,2112.2,2101.2,2202.4,2303.2,2415.8,2259.1,2183.1,2026.2,2190.4,2185.5,2207.7,2147.2,2051.3,2182.6,2058.4,2276.4,2175.8,2028.4,2448.4,2375.5,2203.9,2076.6,2123.1,2156.9,2128,2245.8,2163,2373.7,2296.2,2085.2,2439,2386.6,2369.3,2119,2230.9,2246.6,2258.1,2272.8,2267.5,2481.9,2582,2245,2543.7,2492.6,2769.1,2643.2,2716.3,2555.7,2489.4,2585.2,2403.3,2513.7,2615.5,2487.6,2757.3,2556.3,2708.4,2518.3,2537,2514.8,2286.8,1975.5,1853.5,2355.2,2604.6,2566.3,2849,2774.5,2794.3,2573.7,2605.6,2592.2,2667.9,2802.6,2696.6,2828.5,2683.2,2606.8,3002.8];

(function(){
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const labels = [];
  let y = 2018, m = 0;
  for (let i = 0; i < CONSUM_VALUES.length; i++) {
    labels.push(months[m] + ' ' + y);
    if (++m === 12) { m = 0; y++; }
  }

  const n = CONSUM_VALUES.length;
  let sx = 0, sy = 0, sxy = 0, sx2 = 0;
  for (let i = 0; i < n; i++) { sx += i; sy += CONSUM_VALUES[i]; sxy += i*CONSUM_VALUES[i]; sx2 += i*i; }
  const slope = (n*sxy - sx*sy) / (n*sx2 - sx*sx);
  const intercept = (sy - slope*sx) / n;
  const trend = CONSUM_VALUES.map((_, i) => +(intercept + slope*i).toFixed(1));

  // Stat 1: average annual growth rate (CAGR) implied by trend line
  const years = (n - 1) / 12;
  const trendGrowthPct = ((Math.pow(trend[n-1] / trend[0], 1 / years) - 1) * 100).toFixed(1);
  // Stat 2: YoY — last point vs same month prior year (n-1 vs n-13)
  const yoyPct = ((CONSUM_VALUES[n-1] - CONSUM_VALUES[n-13]) / CONSUM_VALUES[n-13] * 100).toFixed(1);
  const sign = v => (+v >= 0 ? '+' : '');
  const pill = (label, val) =>
    `<span style="font-size:10px;color:#444;background:rgba(255,255,255,.9);padding:2px 8px;border-radius:8px;border:1px solid #E0E0E0;white-space:nowrap">${label}: <b>${sign(val)}${val}%</b></span>`;
  document.getElementById('consumStats').innerHTML =
    pill('Avg. annual growth (trend)', trendGrowthPct) + pill('YoY Mar-26', yoyPct);

  new Chart(document.getElementById('consumChart').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Consumption',
          data: CONSUM_VALUES,
          borderColor: '#1565C0',
          backgroundColor: 'rgba(21,101,192,0.08)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
          order: 2,
        },
        {
          label: 'Trend',
          data: trend,
          borderColor: '#E53935',
          borderWidth: 1.5,
          borderDash: [5,3],
          pointRadius: 0,
          fill: false,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font:{size:10.5,family:'Segoe UI',weight:300}, boxWidth:20, boxHeight:2, padding:12, color:'#555' }
        },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y.toFixed(1)} GWh` }
        }
      },
      scales: {
        x: {
          grid: { display:false },
          ticks: {
            font:{size:10,family:'Segoe UI'}, color:'#777', maxRotation:0,
            callback: function(val, idx) {
              const last = labels.length - 1;
              if (idx === last) return labels[idx];
              if (idx % 6 === 0 && (last - idx) > 3) return labels[idx];
              return null;
            }
          }
        },
        y: {
          grid: { color:'#F0F0F0' },
          ticks: { font:{size:10,family:'Segoe UI'}, color:'#777', callback: v => v.toLocaleString() + ' GWh' },
          border: { dash:[3,3] }
        }
      }
    }
  });
})();

// --- Q3: Invoiced energy by sector ---
(function(){
  const RES = [632.2,634.0,641.0,662.2,642.6,601.3,574.9,591.6,577.7,595.9,616.4,630.6,672.3,663.2,669.8,674.9,667.6,630.9,605.4,602.4,589.9,613.1,624.3,642.4,702.2,682.0,682.1,729.2,696.6,707.4,642.0,633.3,635.4,647.3,637.8,667.9,700.6,691.3,695.7,719.7,663.2,645.2,628.4,634.9,617.6,658.1,642.1,662.4,684.5,669.6,698.0,702.3,668.4,623.6,615.8,626.2,633.5,604.3,638.5,668.2,720.6,703.5,729.6,757.4,757.8,749.6,696.1,727.1,716.4,699.7,700.8,687.6,781.4,686.6,764.2,806.4,775.3,729.6,641.4,701.2,664.7,599.4,539.7,580.1,729.6,776.1,773.3,809.8,806.6,747.0,702.3,702.3,692.2,725.9,732.6,727.6,810.9,780.4,809.6];
  const COM = [329.2,313.5,340.1,321.8,323.8,316.7,308.6,314.9,307.9,310.1,319.2,324.7,333.8,323.4,332.9,339.4,338.8,328.2,320.6,321.0,313.6,315.0,321.2,335.6,347.6,342.0,327.9,265.4,225.7,216.5,261.3,269.3,275.9,289.3,293.5,305.7,309.0,303.8,315.5,316.8,296.9,303.2,306.2,313.2,307.4,315.3,321.6,331.9,330.1,317.3,337.0,348.5,346.2,324.7,318.3,333.9,335.1,325.2,336.2,347.4,364.0,354.4,362.2,371.5,385.1,378.7,362.7,379.4,373.7,365.1,367.6,361.1,379.6,342.7,376.6,389.5,381.7,380.5,342.1,372.0,355.7,327.1,289.6,306.1,359.6,380.6,375.1,396.6,394.8,391.0,380.1,380.7,378.9,385.8,388.8,398.7,405.7,403.8,404.1];
  const IND = [407.6,397.1,402.6,444.9,442.9,442.3,439.5,433.1,412.5,427.3,435.9,406.0,413.1,413.8,440.0,429.9,429.5,408.7,415.0,434.7,400.6,417.3,442.1,409.5,427.8,452.0,400.1,278.6,291.7,364.2,393.2,403.2,436.8,462.5,461.3,449.4,444.2,446.3,480.8,470.2,491.9,475.3,473.2,480.2,416.8,490.1,504.0,487.5,491.2,486.5,491.1,546.2,546.7,479.6,522.9,505.2,517.9,503.4,519.1,528.8,515.9,507.7,494.0,526.4,550.7,540.5,497.7,523.8,517.5,497.3,528.5,473.6,512.8,450.3,515.5,533.6,532.6,570.2,530.1,537.8,493.1,445.4,405.1,397.4,485.4,546.2,542.4,576.8,591.2,605.4,576.2,552.1,572.9,576.3,588.0,570.8,574.6,585.8,563.3];

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const labels = [];
  let y = 2018, m = 0;
  for (let i = 0; i < RES.length; i++) {
    labels.push(months[m] + ' ' + y);
    if (++m === 12) { m = 0; y++; }
  }

  new Chart(document.getElementById('sectorChart').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Residential', data:RES, borderColor:'#1565C0', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false, order:3 },
        { label:'Commercial',  data:COM, borderColor:'#F9A825', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false, order:2 },
        { label:'Industrial',  data:IND, borderColor:'#2E7D32', borderWidth:1.5, pointRadius:0, tension:0.3, fill:false, order:1 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: {
          position:'bottom',
          labels:{ font:{size:10.5,family:'Segoe UI',weight:300}, boxWidth:20, boxHeight:2, padding:12, color:'#555' }
        },
        tooltip: {
          mode:'index', intersect:false,
          callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y.toFixed(1)} GWh` }
        }
      },
      scales: {
        x: {
          grid:{ display:false },
          ticks:{
            font:{size:10,family:'Segoe UI'}, color:'#777', maxRotation:0,
            callback: function(val, idx) {
              const last = labels.length - 1;
              if (idx === last) return labels[idx];
              if (idx % 6 === 0 && (last - idx) > 3) return labels[idx];
              return null;
            }
          }
        },
        y: {
          grid:{ color:'#F0F0F0' },
          ticks:{ font:{size:10,family:'Segoe UI'}, color:'#777', callback: v => v.toLocaleString() + ' GWh' },
          border:{ dash:[3,3] }
        }
      }
    }
  });
})();

// --- Q1: Annual delta ---
const ctx = document.getElementById('deltaChart').getContext('2d');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: YEARS,
    datasets: SERIES.map(s => ({
      label: s.label,
      data:  s.data,
      backgroundColor: s.color,
      borderColor: s.color,
      borderWidth: 0,
      borderRadius: 2,
      stack: 'stack',
    }))
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font:{ size:10.5, family:'Segoe UI', weight:300 },
          boxWidth:10, boxHeight:10,
          padding:12, color:'#555',
        }
      },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(1)} MW`
        }
      }
    },
    scales: {
      x: {
        stacked: true,
        grid:{ display:false },
        ticks:{ font:{size:10.5, family:'Segoe UI'}, color:'#777' }
      },
      y: {
        stacked: true,
        grid:{ color:'#F0F0F0' },
        ticks:{ font:{size:10.5, family:'Segoe UI'}, color:'#777',
                callback: v => (v >= 0 ? '+' : '') + v + ' MW' },
        border:{ dash:[3,3] }
      }
    }
  }
});
</script>
</body>
</html>
